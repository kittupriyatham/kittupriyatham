name: Update README Date
on:
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        
      - name: Format Date and Inject
        run: |
          python -c "
          import re
          from datetime import datetime
          
          # Generate the exact string
          pure_string = datetime.now().strftime('%d %B %Y')
          
          # Read the current README
          with open('README.md', 'r') as f:
              content = f.read()
              
          # Find the 'Last updated:' line and replace it
          pattern = r'Last updated:.*'
          replacement = f'Last updated: {pure_string}'
          new_content = re.sub(pattern, replacement, content)
          
          # Save the updated file
          with open('README.md', 'w') as f:
              f.write(new_content)
          "
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          # The [skip ci] tag prevents the Action from accidentally triggering itself endlessly
          git commit -m "docs: update date to $PURE_STRING [skip ci]" || exit 0
          git push


