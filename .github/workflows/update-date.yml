name: Update README Date
on:
  push:
    branches:
      - main
    paths:
      - 'README.md'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Format Date and Inject
        run: |
          # Generates the exact format: DD Month YYYY (e.g., 30 March 2021)
          PURE_STRING=$(date +"%d %B %Y")
          
          # Inject into the README replacing everything between the markers
          sed -i "//,//c\\nLast updated: $PURE_STRING\n" README.md

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          # The [skip ci] tag prevents the Action from accidentally triggering itself endlessly
          git commit -m "docs: update date to $PURE_STRING [skip ci]" || exit 0
          git push
